[package]
name = "sqlorm"
version = "0.1.0"
edition = "2024"
authors = ["Your Name <lev@lavryniuk.com>"]
description = "A developer-friendly, type-safe ORM for Rust built on top of SQLx, with compile-time checked queries, automatic CRUD, and relationship helpers."
license = "MIT"
repository = "https://github.com/yourusername/sqlorm"
homepage = "https://github.com/yourusername/sqlorm"
documentation = "https://docs.rs/sqlorm"
readme = "README.md"
keywords = ["orm", "sqlx", "database", "rust", "postgres"]
categories = ["database", "development-tools", "web-programming"]

[dependencies]
sqlx = { version = "0.7", features = [
  "runtime-tokio",
  "macros",
  "postgres",
  "chrono",
] }
tokio = { version = "1.40", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# For procedural macros
syn = { version = "2.0", features = ["full"] }
quote = "1.0"
proc-macro2 = "1.0"
